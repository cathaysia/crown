name: publish-release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
env:
  CARGO_TERM_COLOR: always
jobs:
  publish-crate:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: setup env
        run: |
          sudo apt update -y
          sudo apt install build-essential gcc cpp libclang-dev openssl libssl-dev -y

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.89.0

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.10
      - name: publish crown-jsasm crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: |
          cargo publish -p crown-jsasm --allow-dirty
      - name: publish crown-derive crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: |
          cargo publish -p crown-derive --allow-dirty
      - name: publish crown crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: |
          cargo publish -p crown --allow-dirty
      - name: publish crown-bin crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: |
          cargo publish -p crown-bin --allow-dirty
  build-cross:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-gnu
          - aarch64-unknown-linux-musl
          - x86_64-pc-windows-gnu
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: setup env
        run: |
          sudo apt update -y
          sudo apt install build-essential gcc cpp libclang-dev openssl libssl-dev -y

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.89.0

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.10
      - name: install cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: build crown-bin
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        working-directory: crown-bin/
        run: |
          cross build --release --target ${{ matrix.target }} --no-default-features
      - name: build c bindings
        if: ${{ !contains(matrix.target, 'musl') }}
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        working-directory: crown-cabi/
        run: |
          cross build --release --target ${{ matrix.target }} --no-default-features
      - name: create sysroot structure
        run: |
          mkdir -p release-bin
          mkdir -p release-cabi/include

          # Copy binary
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            cp target/${{ matrix.target }}/release/crown.exe release-bin/
          else
            cp target/${{ matrix.target }}/release/crown release-bin/
          fi

          # Copy library
          if [[ "${{ matrix.target }}" != *"musl"* ]]; then
            # Copy static library
            cp target/${{ matrix.target }}/release/libcrown.a release-cabi/

            # Copy header file generated by build.rs
            cp crown-cabi/include/crown.h release-cabi/include/
          fi
      - name: create archive
        run: |
          tar -czf crown-${{ matrix.target }}.tar.gz -C release-bin .
          if [[ "${{ matrix.target }}" != *"musl"* ]]; then
            tar -czf cabi-${{ matrix.target }}.tar.gz -C release-cabi .
          fi
      - name: upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: "*.tar.gz"
  create-release:
    needs: [publish-crate, build-cross]
    permissions:
      contents: write
      discussions: write
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v6
      - name: download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/
      - name: list artifacts
        run: |
          echo "Listing artifacts directory structure:"
          ls artifacts/**/*
      - name: create release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*/*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
